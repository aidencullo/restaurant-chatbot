<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella's Kitchen - Chat with us</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf7f2;
      --card: #ffffff;
      --accent: #b5451b;
      --accent-hover: #943a16;
      --text: #2c2c2c;
      --text-light: #6b6b6b;
      --border: #e8e0d6;
      --user-bubble: #b5451b;
      --bot-bubble: #f0ebe4;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-light);
    }

    .api-key-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .api-key-bar label {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text-light);
    }

    .api-key-bar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-key-bar input:focus {
      border-color: var(--accent);
    }

    .api-key-bar .status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    .api-key-bar .status.connected {
      background: #4caf50;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 720px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message.bot .avatar {
      background: var(--accent);
      color: white;
    }

    .message.user .avatar {
      background: #e0d6cc;
      color: var(--text);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: white;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bot-bubble);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    #input-area textarea:focus {
      border-color: var(--accent);
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .welcome h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p { margin-bottom: 16px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestions button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .suggestions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">B</div>
    <div class="header-text">
      <h1>Bella's Kitchen</h1>
      <p>Ask about our menu, hours, reservations & more</p>
    </div>
  </header>

  <div class="api-key-bar">
    <label for="api-key">API Key:</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." />
    <div class="status" id="key-status" title="Not connected"></div>
  </div>

  <div id="chat-container">
    <div class="welcome">
      <h2>Welcome to Bella's Kitchen</h2>
      <p>I'm here to help with anything about our restaurant.</p>
      <div class="suggestions">
        <button onclick="sendSuggestion(this)">What's on the menu?</button>
        <button onclick="sendSuggestion(this)">What are your hours?</button>
        <button onclick="sendSuggestion(this)">Do you take reservations?</button>
        <button onclick="sendSuggestion(this)">Any specials today?</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask us anything..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const SYSTEM_PROMPT = `You are the friendly virtual assistant for Bella's Kitchen, an Italian-American restaurant. Answer customer questions warmly and helpfully. Keep answers concise.

RESTAURANT INFO:

Name: Bella's Kitchen
Cuisine: Italian-American
Location: 247 Maple Street, Brooklyn, NY 11215
Phone: (718) 555-0142
Website: bellaskitchen.com

HOURS:
- Monday: Closed
- Tuesday-Thursday: 11:30 AM - 9:30 PM
- Friday-Saturday: 11:30 AM - 10:30 PM
- Sunday: 12:00 PM - 9:00 PM

MENU:

Appetizers:
- Bruschetta Trio (classic tomato, mushroom, roasted pepper) — $14
- Calamari Fritti with marinara — $16
- Burrata with heirloom tomatoes & basil — $18
- Meatballs al Forno (grandma's recipe) — $15

Pasta:
- Spaghetti Carbonara — $22
- Rigatoni Bolognese (slow-simmered 6 hours) — $24
- Cacio e Pepe — $20
- Pappardelle with braised short rib — $28
- Linguine alle Vongole (fresh clams) — $26
- Penne Arrabbiata (spicy) — $19

Pizza (12" wood-fired):
- Margherita — $18
- Pepperoni & Hot Honey — $21
- Funghi (wild mushroom, truffle oil, fontina) — $23
- Bianca (ricotta, garlic, arugula) — $20

Entrees:
- Chicken Parmigiana with spaghetti — $26
- Pan-Seared Salmon, lemon caper butter — $30
- Grilled Branzino, herbs & olive oil — $32
- 12oz NY Strip, roasted potatoes — $38

Desserts:
- Tiramisu (house-made) — $12
- Cannoli (ricotta, chocolate chip) — $10
- Panna Cotta with berry compote — $11
- Affogato (espresso + gelato) — $9

Drinks:
- Full wine list (Italian & domestic), cocktails, beer, espresso bar
- Signature cocktail: "The Bella" — Aperol spritz with blood orange

POLICIES:
- Reservations: Accepted via phone or OpenTable. Walk-ins welcome but reservations recommended for Friday/Saturday.
- Private dining: Available for parties of 12-40. Contact us for details.
- Dietary: Gluten-free pasta available (+$3). Several vegetarian options. Ask about vegan modifications.
- Parking: Street parking. Municipal lot one block east on 3rd Ave.
- Dress code: Smart casual.
- Kids: Children's menu available (not listed, ask).
- Delivery: Available through DoorDash and Uber Eats within 3 miles.
- Happy Hour: Tuesday-Friday 4-6 PM, $8 select wines & cocktails, $6 beer, half-price appetizers.
- Gift cards: Available in any amount.
- Catering: Available for events. Minimum 20 guests. Call for custom menu.

CURRENT SPECIALS:
- Tuesday: Half-price bottles of wine
- Wednesday: Pasta Night — all pastas $17
- Sunday: Family-style brunch 12-3 PM, $35/person

If a customer asks about something you don't have information on, kindly suggest they call the restaurant directly.`;

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyInput = document.getElementById('api-key');
    const keyStatus = document.getElementById('key-status');
    let messages = [];
    let isLoading = false;

    // Restore API key from sessionStorage
    const savedKey = sessionStorage.getItem('anthropic_key');
    if (savedKey) {
      apiKeyInput.value = savedKey;
      keyStatus.classList.add('connected');
      keyStatus.title = 'Key saved';
    }

    apiKeyInput.addEventListener('input', () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        sessionStorage.setItem('anthropic_key', key);
        keyStatus.classList.add('connected');
        keyStatus.title = 'Key saved';
      } else {
        sessionStorage.removeItem('anthropic_key');
        keyStatus.classList.remove('connected');
        keyStatus.title = 'Not connected';
      }
    });

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendSuggestion(btn) {
      userInput.value = btn.textContent;
      sendMessage();
    }

    function addMessage(role, text) {
      // Remove welcome screen on first message
      const welcome = chatContainer.querySelector('.welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="avatar">${role === 'user' ? '?' : 'B'}</div>
        <div class="bubble">${escapeHtml(text)}</div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing';
      div.innerHTML = `
        <div class="avatar">B</div>
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      const apiKey = apiKeyInput.value.trim();

      if (!text || isLoading) return;

      if (!apiKey) {
        addMessage('assistant', 'Please enter your Anthropic API key above to get started.');
        return;
      }

      isLoading = true;
      sendBtn.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 1024,
            system: SYSTEM_PROMPT,
            messages: messages,
          }),
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error: ${res.status}`);
        }

        const data = await res.json();
        const reply = data.content[0].text;

        messages.push({ role: 'assistant', content: reply });
        addMessage('assistant', reply);
      } catch (err) {
        removeTyping();
        addMessage('assistant', `Something went wrong: ${err.message}`);
        // Remove the failed exchange from history
        messages.pop();
      }

      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
