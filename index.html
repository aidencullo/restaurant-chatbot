<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella's Kitchen - Chat with us</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf7f2;
      --card: #ffffff;
      --accent: #b5451b;
      --accent-hover: #943a16;
      --text: #2c2c2c;
      --text-light: #6b6b6b;
      --border: #e8e0d6;
      --user-bubble: #b5451b;
      --bot-bubble: #f0ebe4;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-light);
    }

    #model-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      flex-shrink: 0;
    }

    #model-bar.hidden { display: none; }

    .progress-label {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 720px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message.bot .avatar {
      background: var(--accent);
      color: white;
    }

    .message.user .avatar {
      background: #e0d6cc;
      color: var(--text);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
      color: white;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bot-bubble);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    #input-area textarea:focus {
      border-color: var(--accent);
    }

    #send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }

    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .welcome h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p { margin-bottom: 16px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestions button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .suggestions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .no-webgpu {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .no-webgpu h2 {
      color: var(--accent);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">B</div>
    <div class="header-text">
      <h1>Bella's Kitchen</h1>
      <p>AI assistant powered by Qwen 2.5 — runs entirely in your browser</p>
    </div>
  </header>

  <div id="model-bar">
    <div class="progress-label" id="progress-label">Loading AI model... (first visit downloads ~900 MB, cached after)</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div id="chat-container">
    <div class="welcome" id="welcome">
      <h2>Welcome to Bella's Kitchen</h2>
      <p>I'm here to help with anything about our restaurant.<br>The AI model is loading — you can chat once it's ready.</p>
      <div class="suggestions">
        <button onclick="sendSuggestion(this)">What's on the menu?</button>
        <button onclick="sendSuggestion(this)">What are your hours?</button>
        <button onclick="sendSuggestion(this)">Do you take reservations?</button>
        <button onclick="sendSuggestion(this)">Any specials today?</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask us anything..." onkeydown="handleKey(event)" disabled></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const SYSTEM_PROMPT = `You are the friendly virtual assistant for Bella's Kitchen, an Italian-American restaurant. Answer customer questions warmly and helpfully. Keep answers concise.

RESTAURANT INFO:

Name: Bella's Kitchen
Cuisine: Italian-American
Location: 247 Maple Street, Brooklyn, NY 11215
Phone: (718) 555-0142
Website: bellaskitchen.com

HOURS:
- Monday: Closed
- Tuesday-Thursday: 11:30 AM - 9:30 PM
- Friday-Saturday: 11:30 AM - 10:30 PM
- Sunday: 12:00 PM - 9:00 PM

MENU:

Appetizers:
- Bruschetta Trio (classic tomato, mushroom, roasted pepper) — $14
- Calamari Fritti with marinara — $16
- Burrata with heirloom tomatoes & basil — $18
- Meatballs al Forno (grandma's recipe) — $15

Pasta:
- Spaghetti Carbonara — $22
- Rigatoni Bolognese (slow-simmered 6 hours) — $24
- Cacio e Pepe — $20
- Pappardelle with braised short rib — $28
- Linguine alle Vongole (fresh clams) — $26
- Penne Arrabbiata (spicy) — $19

Pizza (12" wood-fired):
- Margherita — $18
- Pepperoni & Hot Honey — $21
- Funghi (wild mushroom, truffle oil, fontina) — $23
- Bianca (ricotta, garlic, arugula) — $20

Entrees:
- Chicken Parmigiana with spaghetti — $26
- Pan-Seared Salmon, lemon caper butter — $30
- Grilled Branzino, herbs & olive oil — $32
- 12oz NY Strip, roasted potatoes — $38

Desserts:
- Tiramisu (house-made) — $12
- Cannoli (ricotta, chocolate chip) — $10
- Panna Cotta with berry compote — $11
- Affogato (espresso + gelato) — $9

Drinks:
- Full wine list (Italian & domestic), cocktails, beer, espresso bar
- Signature cocktail: "The Bella" — Aperol spritz with blood orange

POLICIES:
- Reservations: Accepted via phone or OpenTable. Walk-ins welcome but reservations recommended for Friday/Saturday.
- Private dining: Available for parties of 12-40. Contact us for details.
- Dietary: Gluten-free pasta available (+$3). Several vegetarian options. Ask about vegan modifications.
- Parking: Street parking. Municipal lot one block east on 3rd Ave.
- Dress code: Smart casual.
- Kids: Children's menu available (not listed, ask).
- Delivery: Available through DoorDash and Uber Eats within 3 miles.
- Happy Hour: Tuesday-Friday 4-6 PM, $8 select wines & cocktails, $6 beer, half-price appetizers.
- Gift cards: Available in any amount.
- Catering: Available for events. Minimum 20 guests. Call for custom menu.

CURRENT SPECIALS:
- Tuesday: Half-price bottles of wine
- Wednesday: Pasta Night — all pastas $17
- Sunday: Family-style brunch 12-3 PM, $35/person

If a customer asks about something you don't have information on, kindly suggest they call the restaurant directly.`;

    const MODEL_ID = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const modelBar = document.getElementById('model-bar');
    const progressLabel = document.getElementById('progress-label');
    const progressFill = document.getElementById('progress-fill');

    let engine = null;
    let messages = [];
    let isLoading = false;

    // Check WebGPU support
    if (!navigator.gpu) {
      modelBar.classList.add('hidden');
      chatContainer.innerHTML = `
        <div class="no-webgpu">
          <h2>WebGPU Not Supported</h2>
          <p>This chatbot runs an AI model directly in your browser using WebGPU.</p>
          <p>Please use <strong>Chrome 113+</strong> or <strong>Edge 113+</strong> on a desktop device.</p>
          <p>Safari and Firefox do not fully support WebGPU yet.</p>
        </div>
      `;
    } else {
      initEngine();
    }

    async function initEngine() {
      try {
        engine = await webllm.CreateMLCEngine(MODEL_ID, {
          initProgressCallback: (report) => {
            progressLabel.textContent = report.text;
            if (report.progress !== undefined) {
              progressFill.style.width = (report.progress * 100) + '%';
            }
          },
        });

        // Model loaded — enable input
        modelBar.classList.add('hidden');
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.placeholder = "Ask us anything...";
        userInput.focus();

        const welcomeP = document.querySelector('.welcome p');
        if (welcomeP) {
          welcomeP.textContent = "I'm here to help with anything about our restaurant.";
        }
      } catch (err) {
        progressLabel.textContent = `Failed to load model: ${err.message}`;
        progressFill.style.background = '#e53935';
        progressFill.style.width = '100%';
        console.error(err);
      }
    }

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    window.handleKey = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    };

    window.sendSuggestion = function(btn) {
      if (!engine || userInput.disabled) return;
      userInput.value = btn.textContent;
      sendMessage();
    };

    function addMessage(role, text) {
      const welcome = chatContainer.querySelector('.welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="avatar">${role === 'user' ? '?' : 'B'}</div>
        <div class="bubble">${escapeHtml(text)}</div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing';
      div.innerHTML = `
        <div class="avatar">B</div>
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.sendMessage = async function() {
      const text = userInput.value.trim();
      if (!text || isLoading || !engine) return;

      isLoading = true;
      sendBtn.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      showTyping();

      try {
        const reply = await engine.chat.completions.create({
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...messages,
          ],
          max_tokens: 512,
          temperature: 0.7,
        });

        removeTyping();

        const content = reply.choices[0].message.content;
        messages.push({ role: 'assistant', content });
        addMessage('assistant', content);
      } catch (err) {
        removeTyping();
        addMessage('assistant', `Something went wrong: ${err.message}`);
        messages.pop();
        console.error(err);
      }

      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    };
  </script>
</body>
</html>
